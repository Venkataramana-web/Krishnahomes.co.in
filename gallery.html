<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Projects - Venkat Interiors</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0e0e0e;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  background: #000;
}

header h1 {
  color: gold;
}

.back-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 5px;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
  <h1>Our Interior Projects</h1>
  <a href="index.html" class="back-btn">← Back to Home</a>

<section class="section">

    <img src="https://images.unsplash.com/photo-1616047006789-b7af5afb8c20">
